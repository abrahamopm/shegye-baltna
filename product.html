<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | Shegye Baltna</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .nav { background: rgba(44, 24, 16, 0.95); backdrop-filter: blur(20px); }
    body { padding-top: 120px; }
    .product-detail { display: flex; gap: 4rem; flex-wrap: wrap; margin-bottom: 4rem; }
    .product-detail-img { flex: 1; min-width: 300px; border-radius: 8px; overflow: hidden; position: relative; }
    .product-detail-img img { width: 100%; display: block; transition: transform 0.5s; }
    .product-detail-img:hover img { transform: scale(1.2); cursor: zoom-in; }
    .product-detail-info { flex: 1; min-width: 300px; }
    .product-detail-info h1 { font-size: 3rem; margin-bottom: 1rem; }
    .price-large { font-size: 2rem; color: var(--clr-berbere); font-weight: bold; margin-bottom: 2rem; }
    .qty-controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .qty-btn { width: 40px; height: 40px; border: 1px solid var(--clr-gold); background: transparent; font-size: 1.5rem; cursor: none; }
  </style>
</head>
<body>

  <div class="page-overlay"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <img src="logo.jpg" alt="Shegye Baltna Logo">
      <span data-en="Shegye Baltna" data-am="ሸግዬ ባልትና">Shegye Baltna</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link" data-en="Home" data-am="ዋና ገፅ">Home</a>
      <a href="story.html" class="nav-link" data-en="Story" data-am="ታሪካችን">Story</a>
      <a href="shop.html" class="nav-link" data-en="Spices Shop" data-am="የቅመማ ሱቅ">Spices Shop</a>
      <a href="contact.html" class="nav-link" data-en="Contact" data-am="ያግኙን">Contact</a>
    </div>
    <div style="display: flex; align-items: center; gap: 2rem;">
      <div class="lang-toggle">
        <div class="lang-toggle-indicator"></div>
        <span class="lang-label lang-en">EN</span>
        <span class="lang-label lang-am">አማ</span>
      </div>
      <a href="cart.html" class="cart-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <div class="cart-badge" style="display:none">0</div>
      </a>
    </div>
  </nav>

  <section class="container">
    <div class="product-detail">
      <div class="product-detail-img reveal-right">
        <img src="assets/images/spice-berbero.png" alt="Berbere" id="detail-img">
      </div>
      <div class="product-detail-info reveal-left">
        <h1 data-en="Premium Berbere" data-am="ልዩ በርበሬ">Premium Berbere</h1>
        <div class="price-large">158 ETB</div>
        <p style="margin-bottom: 2rem; line-height: 1.6;" data-en="Our signature Berbere blend, sun-dried and perfectly balanced. Essential for any Ethiopian stew." data-am="ልዩ የበርበሬ ቅልቅላችን፣ በፀሐይ የደረቀ እና የተመጣጠነ። ለማንኛውም የኢትዮጵያ ወጥ አስፈላጊ ነው።">Our signature Berbere blend, sun-dried and perfectly balanced. Essential for any Ethiopian stew.</p>
        
        <div class="qty-controls">
          <button class="qty-btn" onclick="document.getElementById('p-qty').innerText = Math.max(1, parseInt(document.getElementById('p-qty').innerText)-1)">-</button>
          <span id="p-qty" style="font-size:1.5rem; font-weight:bold; width: 30px; text-align:center;">1</span>
          <button class="qty-btn" onclick="document.getElementById('p-qty').innerText = parseInt(document.getElementById('p-qty').innerText)+1">+</button>
        </div>
        
        <button class="btn-primary btn-magnetic" id="btn-add-detail" data-en="ADD TO BASKET" data-am="ወደ ቅርጫት ጨምር">ADD TO BASKET</button>
      </div>
    </div>
  </section>

  <footer>
    <img src="logo.jpg" alt="Logo">
    <p>&copy; 2026 Shegye Baltna. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('btn-add-detail').addEventListener('click', (e) => {
        const qty = parseInt(document.getElementById('p-qty').innerText);
        const name = document.querySelector('h1').getAttribute('data-en');
        const img = document.getElementById('detail-img').src;
        addToCart({id: name, name: name, price: 158, img: img, qty: qty});
        
        const badge = document.querySelector('.cart-badge');
        badge.classList.add('bump');
        setTimeout(() => badge.classList.remove('bump'), 300);
      });
      
      const imgWrap = document.querySelector('.product-detail-img');
      const img = imgWrap.querySelector('img');
      imgWrap.addEventListener('mousemove', e => {
        const rect = imgWrap.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * 100;
        const y = (e.clientY - rect.top) / rect.height * 100;
        img.style.transformOrigin = `${x}% ${y}%`;
      });
      imgWrap.addEventListener('mouseleave', () => {
        img.style.transformOrigin = 'center center';
      });
    });
  </script>
</body>
</html>
