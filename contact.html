<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Shegye Baltna</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .nav { background: rgba(44, 24, 16, 0.95); backdrop-filter: blur(20px); }
    body { padding-top: 120px; }
    .contact-layout { display: flex; gap: 4rem; flex-wrap: wrap; margin-bottom: 4rem; align-items: center;}
    .contact-info { flex: 1; min-width: 300px; }
    .contact-img { flex: 1; min-width: 300px; text-align: center; }
    .contact-img img { max-width: 80%; animation: float 6s ease-in-out infinite; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
    .info-item { margin-bottom: 2rem; }
    .info-item h4 { color: var(--clr-gold); margin-bottom: 0.5rem; }
    .social-icons { display: flex; gap: 1rem; margin-top: 2rem; }
    .social-icons svg { width: 30px; height: 30px; transition: transform 0.3s, color 0.3s; cursor: none; }
    .social-icons svg:hover { transform: scale(1.2); color: var(--clr-berbere); }
  </style>
</head>
<body>

  <div class="page-overlay"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <img src="logo.jpg" alt="Shegye Baltna Logo">
      <span data-en="Shegye Baltna" data-am="ሸግዬ ባልትና">Shegye Baltna</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link" data-en="Home" data-am="ዋና ገፅ">Home</a>
      <a href="story.html" class="nav-link" data-en="Story" data-am="ታሪካችን">Story</a>
      <a href="shop.html" class="nav-link" data-en="Spices Shop" data-am="የቅመማ ሱቅ">Spices Shop</a>
      <a href="contact.html" class="nav-link" style="color:var(--clr-gold)" data-en="Contact" data-am="ያግኙን">Contact</a>
    </div>
    <div style="display: flex; align-items: center; gap: 2rem;">
      <div class="lang-toggle">
        <div class="lang-toggle-indicator"></div>
        <span class="lang-label lang-en">EN</span>
        <span class="lang-label lang-am">አማ</span>
      </div>
      <a href="cart.html" class="cart-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <div class="cart-badge" style="display:none">0</div>
      </a>
    </div>
  </nav>

  <section class="container contact-layout">
    <div class="contact-info reveal-left">
      <h1 style="font-size: 3.5rem; margin-bottom: 2rem; color: var(--clr-espresso)" data-en="Get in Touch" data-am="ያግኙን">Get in Touch</h1>
      
      <div class="info-item">
        <h4 data-en="Phone" data-am="ስልክ">Phone</h4>
        <p>+251-111-2086</p>
      </div>
      
      <div class="info-item">
        <h4 data-en="Email" data-am="ኢሜል">Email</h4>
        <p>arson@kigmarik.com</p>
      </div>
      
      <div class="info-item">
        <h4 data-en="Follow Us" data-am="ይከታተሉን">Follow Us</h4>
        <div class="social-icons">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 2L11 13"></path><path d="M22 2L15 22L11 13L2 9L22 2Z"></path></svg>
        </div>
      </div>
    </div>
    
    <div class="contact-img reveal-scale">
      <img src="assets/images/contact-illustration.png" alt="Ethiopian Ceremony">
    </div>
  </section>

  <footer>
    <img src="logo.jpg" alt="Logo">
    <p>&copy; 2026 Shegye Baltna. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
