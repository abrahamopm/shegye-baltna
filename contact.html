<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Shegye Baltna</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="page-overlay"></div>

  <nav class="nav" style="background: var(--clr-espresso);">
    <a href="index.html" class="nav-logo">
      <img src="logo.jpg" alt="Shegye Baltna Logo">
      <span data-en="Shegye Baltna" data-am="ሸግዬ ባልትና">Shegye Baltna</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link" data-en="Home" data-am="ዋና ገፅ">Home</a>
      <a href="story.html" class="nav-link" data-en="Story" data-am="ታሪካችን">Story</a>
      <a href="shop.html" class="nav-link" data-en="Spices Shop" data-am="የቅመማ ሱቅ">Spices Shop</a>
      <a href="contact.html" class="nav-link" style="color:var(--clr-gold)" data-en="Contact" data-am="ያግኙን">Contact</a>
    </div>
    <div style="display: flex; align-items: center; gap: 2rem;">
      <div class="lang-toggle">
        <div class="lang-toggle-indicator"></div>
        <span class="lang-label lang-en">EN</span>
        <span class="lang-label lang-am">አማ</span>
      </div>
      <a href="#" class="cart-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <div class="cart-badge" style="display:none">0</div>
      </a>
    </div>
  </nav>

  <section class="section-padding container" style="padding-top: 150px;">
    <div style="display: flex; gap: 4rem; align-items: flex-start; flex-wrap: wrap;">
      
      <div class="reveal-right" style="flex: 1; min-width: 300px;">
        <h1 class="display" style="font-size: 3.5rem; color: var(--clr-espresso); margin-bottom: 2rem;" data-en="Get in Touch" data-am="ያግኙን">Get in Touch</h1>
        <p style="font-size: 1.1rem; line-height: 1.8; color: #555; margin-bottom: 2rem;" data-en="Whether you have a question about our spices, shipping, or just want to say hello, we'd love to hear from you." data-am="ስለ ቅመሞቻችን፣ ስለማጓጓዣ ጥያቄ ካለዎት፣ ወይም ሰላም ማለት ከፈለጉ፣ ከእርስዎ መስማት እንወዳለን።">Whether you have a question about our spices, shipping, or just want to say hello, we'd love to hear from you.</p>
        
        <form style="display: flex; flex-direction: column; gap: 1.5rem;">
          <div class="form-group" style="margin-bottom:0">
            <input type="text" class="form-input" required>
            <label class="form-label" data-en="Name" data-am="ስም">Name</label>
            <div class="form-line"></div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <input type="email" class="form-input" required>
            <label class="form-label" data-en="Email" data-am="ኢሜል">Email</label>
            <div class="form-line"></div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <input type="text" class="form-input" required>
            <label class="form-label" data-en="Message" data-am="መልእክት">Message</label>
            <div class="form-line"></div>
          </div>
          <button type="submit" class="btn-primary btn-magnetic" style="align-self: flex-start; margin-top: 1rem;" data-en="Send Message" data-am="መልእክት ይላኩ">Send Message</button>
        </form>
      </div>

      <div class="reveal-left" style="flex: 1; min-width: 300px; text-align: center;">
        <img src="assets/images/contact-illustration.png" alt="Spices" style="width: 80%; border-radius: 50%; animation: float 6s ease-in-out infinite;">
        
        <div style="margin-top: 3rem;">
          <h3 class="display" style="font-size: 1.5rem; margin-bottom: 1rem; color: var(--clr-gold);" data-en="Follow Us" data-am="ተከተሉን">Follow Us</h3>
          <div style="display: flex; justify-content: center; gap: 1.5rem;">
            <a href="#" style="font-size: 1.5rem; color: var(--clr-espresso); transition: transform 0.3s; cursor: none;">fb</a>
            <a href="#" style="font-size: 1.5rem; color: var(--clr-espresso); transition: transform 0.3s; cursor: none;">ig</a>
            <a href="#" style="font-size: 1.5rem; color: var(--clr-espresso); transition: transform 0.3s; cursor: none;">tw</a>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
