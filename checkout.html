<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Shegye Baltna</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="page-overlay"></div>

  <nav class="nav" style="background: var(--clr-espresso);">
    <a href="index.html" class="nav-logo">
      <img src="logo.jpg" alt="Shegye Baltna Logo">
      <span data-en="Shegye Baltna" data-am="ሸግዬ ባልትና">Shegye Baltna</span>
    </a>
    <div style="display: flex; align-items: center; gap: 2rem;">
      <div class="lang-toggle">
        <div class="lang-toggle-indicator"></div>
        <span class="lang-label lang-en">EN</span>
        <span class="lang-label lang-am">አማ</span>
      </div>
    </div>
  </nav>

  <section class="section-padding container" style="padding-top: 120px;" id="checkout-flow-container">
    <h1 class="display reveal-up" style="font-size: 2.5rem; margin-bottom: 2rem;" data-en="Checkout" data-am="ክፍያ">Checkout</h1>
    
    <div class="checkout-layout">
      <!-- LEFT COLUMN: FLOW -->
      <div class="checkout-flow">
        
        <!-- STEP 1 -->
        <div class="checkout-step-panel active reveal-up">
          <div class="checkout-step-header">
            <div class="step-num">1</div>
            <span data-en="Shipping Details" data-am="የማጓጓዣ ዝርዝሮች">Shipping Details</span>
          </div>
          <div class="checkout-step-content">
            <div class="form-group">
              <input type="text" class="form-input" required id="fname">
              <label class="form-label" data-en="Full Name" data-am="ሙሉ ስም">Full Name</label>
              <div class="form-line"></div>
            </div>
            <div class="form-group">
              <input type="email" class="form-input" required id="femail">
              <label class="form-label" data-en="Email Address" data-am="የኢሜል አድራሻ">Email Address</label>
              <div class="form-line"></div>
            </div>
            <div class="form-group">
              <input type="text" class="form-input" required id="faddr">
              <label class="form-label" data-en="Delivery Address" data-am="የማድረሻ አድራሻ">Delivery Address</label>
              <div class="form-line"></div>
            </div>
            <button class="btn-primary btn-magnetic" onclick="nextCheckoutStep(1)" data-en="Continue to Payment" data-am="ወደ ክፍያ ይቀጥሉ">Continue to Payment</button>
          </div>
        </div>

        <!-- STEP 2 -->
        <div class="checkout-step-panel reveal-up" style="transition-delay:0.1s">
          <div class="checkout-step-header">
            <div class="step-num">2</div>
            <span data-en="Payment Method" data-am="የመክፈያ ዘዴ">Payment Method</span>
          </div>
          <div class="checkout-step-content">
            <label class="bank-option">
              <input type="radio" name="payment" checked>
              <strong data-en="Telebirr" data-am="ቴሌብር">Telebirr</strong>
            </label>
            <label class="bank-option">
              <input type="radio" name="payment">
              <strong data-en="Commercial Bank of Ethiopia (CBE)" data-am="የኢትዮጵያ ንግድ ባንክ (CBE)">Commercial Bank of Ethiopia (CBE)</strong>
            </label>
            <label class="bank-option">
              <input type="radio" name="payment">
              <strong data-en="Dashen Bank" data-am="ዳሽን ባንክ">Dashen Bank</strong>
            </label>

            <div style="display:flex; gap:1rem; margin-top:2rem">
              <button class="btn-secondary" onclick="nextCheckoutStep(0)" data-en="Back" data-am="ተመለስ">Back</button>
              <button class="btn-primary btn-magnetic" onclick="completeOrder()" data-en="Place Order" data-am="ትዕዛዝ ያስገቡ">Place Order</button>
            </div>
          </div>
        </div>

        <!-- SUCCESS -->
        <div class="checkout-step-panel" id="checkout-success" style="border:none; text-align:center;">
          <div class="checkout-step-content" style="display:block; padding: 4rem 2rem; position:relative; overflow:hidden">
            <div style="width:80px; height:80px; background:var(--clr-gold); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:3rem; margin:0 auto 2rem;">✓</div>
            <h2 class="display" style="font-size:2.5rem; margin-bottom:1rem" data-en="Order Confirmed!" data-am="ትዕዛዙ ተረጋግጧል!">Order Confirmed!</h2>
            <p style="color:#666; margin-bottom:2rem" data-en="Thank you for your purchase. We are preparing your spices." data-am="ስለገዙን እናመሰግናለን። ቅመሞችዎን እያዘጋጀን ነው።">Thank you for your purchase. We are preparing your spices.</p>
            <a href="shop.html" class="btn-primary btn-magnetic" data-en="Continue Shopping" data-am="ግዢዎን ይቀጥሉ">Continue Shopping</a>
          </div>
        </div>

      </div>

      <!-- RIGHT COLUMN: SUMMARY -->
      <div class="checkout-summary-sidebar reveal-left">
        <h3 class="display" style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--clr-gold-light); padding-bottom: 0.5rem;" data-en="Order Summary" data-am="የትዕዛዝ ማጠቃለያ">Order Summary</h3>
        <div id="checkout-summary-items"></div>
        
        <div style="margin-top: 2rem;">
          <div class="summary-line">
            <span data-en="Subtotal" data-am="ንዑስ ድምር">Subtotal</span><span id="checkout-sub">0 ETB</span>
          </div>
          <div class="summary-line">
            <span data-en="Shipping" data-am="ማጓጓዣ">Shipping</span><span id="checkout-ship">0 ETB</span>
          </div>
          <div class="summary-line">
            <span data-en="Taxes" data-am="ግብሮች">Taxes</span><span id="checkout-tax">0 ETB</span>
          </div>
          <div class="summary-line summary-total">
            <span data-en="Total" data-am="ድምር">Total</span><span id="checkout-total">0 ETB</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
