<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Shegye Baltna</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .nav { background: rgba(44, 24, 16, 0.95); backdrop-filter: blur(20px); }
    body { padding-top: 120px; }
    .checkout-container { max-width: 600px; margin: 0 auto 4rem; position: relative; overflow: hidden; min-height: 500px; }
    
    .progress-container { display: flex; justify-content: space-between; position: relative; margin-bottom: 3rem; }
    .progress-bg { position: absolute; top: 15px; left: 0; width: 100%; height: 2px; background: #ddd; z-index: 1; }
    .progress-fill { position: absolute; top: 15px; left: 0; width: 0%; height: 2px; background: var(--clr-gold); z-index: 2; transition: width 0.6s ease; }
    .progress-step { width: 32px; height: 32px; border-radius: 50%; background: white; border: 2px solid #ddd; z-index: 3; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    
    .checkout-step { width: 100%; position: absolute; top: 80px; left: 0; display: none; }
    .step-actions { display: flex; justify-content: space-between; margin-top: 2rem; }
    
    .bank-option { padding: 1rem; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; }
    .bank-option:hover { border-color: var(--clr-gold); }
    
    .success-icon { width: 80px; height: 80px; background: var(--clr-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; margin: 0 auto 2rem; animation: bounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  </style>
</head>
<body>

  <div class="page-overlay"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <img src="logo.jpg" alt="Shegye Baltna Logo">
      <span data-en="Shegye Baltna" data-am="ሸግዬ ባልትና">Shegye Baltna</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link" data-en="Home" data-am="ዋና ገፅ">Home</a>
      <a href="story.html" class="nav-link" data-en="Story" data-am="ታሪካችን">Story</a>
      <a href="shop.html" class="nav-link" data-en="Spices Shop" data-am="የቅመማ ሱቅ">Spices Shop</a>
      <a href="contact.html" class="nav-link" data-en="Contact" data-am="ያግኙን">Contact</a>
    </div>
    <div style="display: flex; align-items: center; gap: 2rem;">
      <div class="lang-toggle">
        <div class="lang-toggle-indicator"></div>
        <span class="lang-label lang-en">EN</span>
        <span class="lang-label lang-am">አማ</span>
      </div>
      <a href="cart.html" class="cart-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <div class="cart-badge" style="display:none">0</div>
      </a>
    </div>
  </nav>

  <section class="container checkout-container">
    <div class="progress-container">
      <div class="progress-bg"></div>
      <div class="progress-fill"></div>
      <div class="progress-step" style="border-color:var(--clr-gold)">1</div>
      <div class="progress-step">2</div>
      <div class="progress-step">3</div>
    </div>

    <!-- Step 1: Confirm -->
    <div class="checkout-step" id="step-1">
      <h2 data-en="Confirm Order" data-am="ትዕዛዝ ያረጋግጡ">Confirm Order</h2>
      <p style="margin: 1rem 0" data-en="Please review your basket items before proceeding." data-am="እባክዎ ከመቀጠልዎ በፊት የቅርጫት እቃዎችን ይገምግሙ።">Please review your basket items before proceeding.</p>
      
      <div class="form-group" style="margin-top:2rem">
        <input type="text" class="form-input" required>
        <label class="form-label" data-en="Full Name" data-am="ሙሉ ስም">Full Name</label>
        <div class="form-line"></div>
      </div>
      
      <div class="form-group">
        <input type="text" class="form-input" required>
        <label class="form-label" data-en="Shipping Address" data-am="የመላኪያ አድራሻ">Shipping Address</label>
        <div class="form-line"></div>
      </div>

      <div class="step-actions">
        <div></div>
        <button class="btn-primary btn-next btn-magnetic" data-en="Next: Payment" data-am="ቀጣይ፡ ክፍያ">Next: Payment</button>
      </div>
    </div>

    <!-- Step 2: Payment -->
    <div class="checkout-step" id="step-2">
      <h2 data-en="Payment Method" data-am="የክፍያ ዘዴ">Payment Method</h2>
      
      <div style="margin-top:2rem">
        <label class="bank-option">
          <input type="radio" name="payment" checked>
          <div style="font-weight:bold" data-en="Telebirr" data-am="ቴሌብር">Telebirr</div>
        </label>
        
        <label class="bank-option">
          <input type="radio" name="payment">
          <div style="font-weight:bold" data-en="Local Ethiopian Banks" data-am="የሀገር ውስጥ ባንኮች">Local Ethiopian Banks</div>
        </label>
      </div>
      
      <div class="form-group" style="margin-top:2rem">
        <input type="text" class="form-input" required>
        <label class="form-label" data-en="Account Number" data-am="የሂሳብ ቁጥር">Account Number</label>
        <div class="form-line"></div>
      </div>

      <div class="step-actions">
        <button class="btn-secondary btn-prev" style="padding:1rem 2rem; border:1px solid var(--clr-gold); background:transparent; cursor:none;" data-en="Back" data-am="ተመለስ">Back</button>
        <button class="btn-primary btn-next btn-magnetic" data-en="Complete Order" data-am="ትዕዛዝ ጨርስ">Complete Order</button>
      </div>
    </div>

    <!-- Step 3: Success -->
    <div class="checkout-step" id="step-3" style="text-align:center">
      <div class="success-icon">✓</div>
      <h2 style="font-size: 2.5rem; color:var(--clr-berbere)" data-en="Order Success!" data-am="ትዕዛዙ ተሳክቷል!">Order Success!</h2>
      <p style="margin: 1rem 0; font-size:1.2rem" data-en="Thank you for your purchase. Your legacy is on its way to your table." data-am="ስለ ግዢዎ እናመሰግናለን። ቅርሶ ወደ ማዕድዎ በመምጣት ላይ ነው።">Thank you for your purchase. Your legacy is on its way to your table.</p>
      <a href="index.html" class="btn-primary btn-magnetic" style="margin-top:2rem" data-en="Return Home" data-am="ወደ ዋና ገፅ ይመለሱ">Return Home</a>
    </div>

  </section>

  <footer>
    <img src="logo.jpg" alt="Logo">
    <p>&copy; 2026 Shegye Baltna. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
