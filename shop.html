<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spices Shop | Shegye Baltna</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .shop-hero { height: 40vh; background: var(--clr-espresso); display: flex; align-items: center; justify-content: center; color: var(--clr-gold); text-align: center; margin-bottom: 4rem; position: relative; overflow: hidden; }
    .shop-hero::before { content: ''; position: absolute; inset: 0; background: url('data:image/svg+xml,...'); opacity: 0.1; }
  </style>
</head>
<body>

  <div class="page-overlay"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <img src="logo.jpg" alt="Shegye Baltna Logo">
      <span data-en="Shegye Baltna" data-am="ሸግዬ ባልትና">Shegye Baltna</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link" data-en="Home" data-am="ዋና ገፅ">Home</a>
      <a href="story.html" class="nav-link" data-en="Story" data-am="ታሪካችን">Story</a>
      <a href="shop.html" class="nav-link nav-link--current" data-en="Spices Shop" data-am="የቅመማ ሱቅ">Spices Shop</a>
      <a href="contact.html" class="nav-link" data-en="Contact" data-am="ያግኙን">Contact</a>
    </div>
    <div style="display: flex; align-items: center; gap: 2rem;">
      <div class="lang-toggle">
        <div class="lang-toggle-indicator"></div>
        <span class="lang-label lang-en">EN</span>
        <span class="lang-label lang-am">አማ</span>
      </div>
      <a href="cart.html" class="cart-icon" aria-label="Basket">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <div class="cart-badge" style="display:none">0</div>
      </a>
    </div>
  </nav>

  <div class="shop-hero">
    <div class="reveal-scale">
      <h1 class="display" style="font-size: 3.5rem; margin-bottom: 1rem;" data-en="The Spice Market" data-am="የቅመማ ገበያ">The Spice Market</h1>
      <p style="font-size: 1.2rem; color: var(--clr-parchment);" data-en="Authentic flavors, delivered to your door." data-am="ትክክለኛ ጣዕም፣ እስከ በርዎ ድረስ ይደርሳል።">Authentic flavors, delivered to your door.</p>
    </div>
  </div>

  <section class="container" id="main-content" tabindex="-1">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
      <h2 class="display reveal-left" data-en="All Products" data-am="ሁሉም ምርቶች">All Products</h2>
      <div class="shop-toolbar reveal-right">
        <label class="shop-toolbar-label" for="shop-sort" data-en="Sort by" data-am="ደርድር በ">Sort by</label>
        <select id="shop-sort" class="shop-sort-select" aria-label="Sort products">
          <option value="default" data-en="Featured" data-am="ዋና">Featured</option>
          <option value="price-asc" data-en="Price: Low to High" data-am="ዋጋ፦ ከዝቅተኛ">Price: Low to High</option>
          <option value="price-desc" data-en="Price: High to Low" data-am="ዋጋ፦ ከከፍተኛ">Price: High to Low</option>
          <option value="name" data-en="Name A–Z" data-am="ስም ሀ-ፐ">Name A–Z</option>
        </select>
      </div>
    </div>

    <div class="product-grid reveal-stagger" id="catalog-grid"></div>

    <!-- Expanded Carousel Section -->
    <h2 style="margin-top: 6rem" class="display reveal-up" data-en="Best Sellers" data-am="ከፍተኛ ሽያጭ ያላቸው">Best Sellers</h2>
    <div class="h-scroll-strip reveal-up" id="catalog-best-sellers" aria-label="Best sellers"></div>
  </section>

  <footer>
    <img src="logo.jpg" alt="Logo">
    <p>&copy; 2026 Shegye Baltna. All rights reserved.</p>
  </footer>

  <script src="catalog.js"></script>
  <script src="app.js"></script>
</body>
</html>
